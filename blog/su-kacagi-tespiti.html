<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Su Kaçağı veya Boru Patlaması | Trabzon Usta</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style_v2.css">
    <style>
        .post-container { max-width: 850px; margin: 150px auto 100px; padding: 0 5%; }
        .post-header { margin-bottom: 50px; text-align: center; }
        .post-meta { color: var(--accent-blue); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .post-content { 
            background: var(--bg-card); padding: 4rem; border-radius: 30px; border: 1px solid var(--glass-border); 
            line-height: 1.8; font-size: 1.15rem; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        }
        .post-content h2 { color: var(--accent-blue); margin: 2.5rem 0 1rem; font-size: 1.8rem; }
        .post-content p { margin-bottom: 1.5rem; color: var(--text-secondary); }
        .back-btn { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 30px; color: var(--text-secondary); text-decoration: none; font-weight: 600; }
        .phone-highlight { margin-top: 3rem; padding: 2.5rem; background: rgba(56, 189, 248, 0.1); border: 2px solid var(--accent-blue); border-radius: 20px; text-align: center; }
        .phone-number { display: block; font-size: 2.2rem; font-weight: 800; color: var(--accent-blue); text-decoration: none; margin-top: 1rem; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0% { transform: scale(1); } 50% { transform: scale(1.05); text-shadow: 0 0 20px var(--accent-blue); } 100% { transform: scale(1); } }
        @media (max-width: 768px) { .post-content { padding: 2rem; font-size: 1.05rem; } .phone-number { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <nav id="navbar" class="scrolled">
        <a href="../index.html" class="logo">
            <img src="../logo.png" alt="Trabzon Usta">
            TRABZON<span>USTA</span>
        </a>
    </nav>
    <article class="post-container">
        <a href="../index.html#blog" class="back-btn"><i class="fas fa-arrow-left"></i> Blog Listesine Dön</a>
        <header class="post-header">
            <div class="post-meta">Tesisat İpuçları</div>
            <h1>Evde Su Kaçağı veya Boru Patlaması</h1>
        </header>
        <section class="post-content reveal active">
            <h2>İlk Ne Yapılmalı?</h2>
            <p>Su sızıntısı veya boru patlaması durumunda profesyonel cihazlı tespit için bize ulaşın.</p>
            <div class="phone-highlight">
                <p>📞 Su kaçağının evinizi istila etmesine izin vermeyin!</p>
                <a href="tel:05457606100" class="phone-number">0545 760 61 00</a>
            </div>
        </section>
    </article>
    <a href="https://wa.me/905457606100" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span>Bize Ulaşın</span>
    </a>
    <script src="../main.js"></script>
</body>
</html>
